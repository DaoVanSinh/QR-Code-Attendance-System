services:
  mysql:
    image: mysql:8.0
    container_name: qrcode_mysql
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_DATABASE=qrcode_attendance
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcode_backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: qrcode_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
