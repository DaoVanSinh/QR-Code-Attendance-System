services:
  mysql:
    image: mysql:8.0
    container_name: qrcode_mysql
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_DATABASE=qrcode_attendance
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    # Kiểm tra MySQL đã sẵn sàng chưa (không chỉ "started")
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrcode_backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      # Chờ MySQL thực sự sẵn sàng, không chỉ "started"
      mysql:
        condition: service_healthy
    restart: unless-stopped
    # Kiểm tra Spring Boot đã boot xong qua actuator/health
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  frontend:
    image: nginx:alpine
    container_name: qrcode_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      # Nginx chỉ start sau khi backend đã healthy (Spring Boot đã boot xong)
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
