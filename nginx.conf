server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Dùng Docker internal DNS resolver để resolve hostname động
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Exact redirects (ưu tiên cao nhất) ────────────────────────────
    location = / {
        return 302 /common/login.html;
    }
    location = /login {
        return 302 /common/login.html;
    }

    # ── Proxy API requests to Spring Boot backend ─────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    # ── Không cache HTML — đảm bảo luôn lấy file mới sau deploy ──────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Không cache JS ────────────────────────────────────────────────
    location ~* \.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Không cache CSS ───────────────────────────────────────────────
    location ~* \.css$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # ── Phục vụ các file tĩnh khác (images, fonts...) ────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
