server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index common/login.html;

    # Dùng Docker internal DNS resolver để resolve hostname động
    # Tránh lỗi 502 sau khi restart container (IP thay đổi)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to Spring Boot backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        # Tránh lỗi khi backend đang khởi động
        proxy_next_upstream error timeout http_502 http_503;
    }

    # Phục vụ các file tĩnh frontend
    location / {
        try_files $uri $uri/ /common/login.html;
    }
}
