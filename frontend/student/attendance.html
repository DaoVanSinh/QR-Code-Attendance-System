<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Điểm Danh QR | Sinh Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        /* ── Success Overlay — phải dùng position:fixed để che toàn màn hình ── */
        #successOverlay {
            display: none;
            position: fixed;
            inset: 0;                        /* top:0; right:0; bottom:0; left:0 */
            width: 100vw;
            height: 100vh;
            background: rgba(16, 185, 129, 0.96);
            z-index: 99999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }
        #successOverlay.show { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }

        .success-check-icon {
            font-size: 80px;
            color: #fff;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        #successOverlay h2 {
            font-size: 28px; font-weight: 800; color: #fff; margin: 0;
        }
        #successOverlay p { font-size: 16px; color: rgba(255,255,255,0.9); margin: 0; }
        #successOverlay .countdown-text {
            font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 8px;
        }

        /* ── Error state ── */
        #scanStatus.error { color: var(--danger, #ef4444) !important; }

        /* ── Camera loading indicator ── */
        #cameraLoadingMsg {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--primary);
            font-weight: 500;
            font-size: 14px;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }
        #cameraLoadingMsg.show { display: flex; }
        .spin-ring {
            width: 20px; height: 20px;
            border: 3px solid rgba(79,70,229,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-root">
        <header class="app-header premium-header">
            <a href="index.html" style="color:var(--text-muted);display:flex;align-items:center;gap:4px;font-size:14px;font-weight:500;text-decoration:none;padding:4px 0;">
                <ion-icon name="chevron-back-outline"></ion-icon> Trang Chủ
            </a>
            <div class="brand" style="font-size:14px;">🎓 QR Điểm Danh</div>
            <div class="header-profile" onclick="event.stopPropagation(); document.getElementById('studentProfileDropdown').classList.toggle('show')">
                <img src="../teacher/css/default-avatar.png" id="studentAvatar"
                     onerror="this.src='https://ui-avatars.com/api/?name=ST&background=4f46e5&color=fff'" alt="Avatar" class="avatar">
                <div class="user-name" id="studentName">ST</div>
                <ion-icon name="chevron-down-outline"></ion-icon>
                <div class="profile-dropdown" id="studentProfileDropdown" onclick="event.stopPropagation()">
                    <a href="profile.html"><ion-icon name="person-outline"></ion-icon> Thông tin cá nhân</a>
                    <a href="change-password.html"><ion-icon name="key-outline"></ion-icon> Đổi mật khẩu</a>
                    <button class="text-danger" onclick="logout()"><ion-icon name="log-out-outline"></ion-icon> Đăng xuất</button>
                </div>
            </div>
        </header>

        <div class="page-content" style="display:flex;flex-direction:column;flex:1;padding:20px 16px;">
            <div style="text-align:center;margin-bottom:24px;">
                <h1 class="page-title" style="font-size:22px;margin-bottom:6px;">Quét Mã Ngay</h1>
                <p class="page-sub" style="margin:0;font-size:14px;">Đưa mã QR do giảng viên hiển thị vào khung hình.</p>
            </div>

            <!-- Khung camera -->
            <div style="display:flex;justify-content:center;margin-bottom:20px;">
                <div id="reader" style="width:100%;max-width:360px;border-radius:16px;overflow:hidden;background:#000;min-height:10px;"></div>
            </div>

            <!-- Loading camera indicator -->
            <div id="cameraLoadingMsg">
                <div class="spin-ring"></div>
                <span>Đang khởi động camera...</span>
            </div>

            <!-- Nút bật camera -->
            <div id="btnWrap" style="text-align:center;">
                <button id="btnStartCamera" class="btn btn-primary"
                        style="display:inline-flex;align-items:center;gap:8px;width:auto;padding:12px 28px;font-size:15px;border-radius:12px;box-shadow:0 4px 16px rgba(79,70,229,0.3);">
                    <ion-icon name="camera-outline" style="font-size:20px;"></ion-icon>
                    Bật Camera Quét QR
                </button>
            </div>

            <!-- Trạng thái scan -->
            <p id="scanStatus" style="text-align:center;font-size:14px;color:var(--primary);font-weight:500;display:none;margin-top:16px;padding:0 16px;"></p>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn">
                <ion-icon name="home-outline"></ion-icon><span>Trang Chủ</span>
            </a>
            <a href="enrollment.html" class="nav-btn">
                <ion-icon name="book-outline"></ion-icon><span>Đăng Ký</span>
            </a>
            <a href="timetable.html" class="nav-btn">
                <ion-icon name="calendar-outline"></ion-icon><span>Lịch Học</span>
            </a>
            <a href="history.html" class="nav-btn">
                <ion-icon name="time-outline"></ion-icon><span>Kết Quả</span>
            </a>
        </nav>
    </div>

    <!-- ✅ Success Overlay — NGOÀI app-root, position:fixed tự che toàn màn hình -->
    <div id="successOverlay">
        <ion-icon name="checkmark-circle-outline" class="success-check-icon"></ion-icon>
        <h2>Thành Công! 🎉</h2>
        <p>Bạn đã điểm danh thành công.</p>
        <p class="countdown-text">Tự động quay về sau <span id="overlayCountdown">3</span> giây...</p>
    </div>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=101"></script>
    <script>
        // ── Auth check ────────────────────────────────────────────
        const auth = checkAuth('STUDENT');
        if (auth) {
            const nameEl = document.getElementById('studentName');
            if (nameEl) nameEl.textContent = auth.name || 'ST';
            // Load avatar từ cache trước
            const cachedAvatar = localStorage.getItem('user_avatar');
            const avatarEl = document.getElementById('studentAvatar');
            if (cachedAvatar && cachedAvatar.length > 10 && avatarEl) {
                avatarEl.src = cachedAvatar;
            }
            // Fetch mới nhất từ server
            fetchAndCacheAvatar();
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            const dd = document.getElementById('studentProfileDropdown');
            if (dd) dd.classList.remove('show');
        });

        // ── State ─────────────────────────────────────────────────
        let html5QrCode = null;
        let isProcessing = false;
        let libraryLoaded = false;

        // ── Load html5-qrcode library on demand ───────────────────
        function ensureLibraryLoaded(callback) {
            if (libraryLoaded && typeof Html5Qrcode !== 'undefined') {
                callback();
                return;
            }
            const s = document.createElement('script');
            s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
            s.onload = () => {
                libraryLoaded = true;
                callback();
            };
            s.onerror = () => {
                showStatus('❌ Không thể tải thư viện QR. Kiểm tra kết nối mạng.', true);
                resetBtn();
            };
            document.head.appendChild(s);
        }

        // ── Auto-submit nếu URL có ?qr= (quét từ link) ───────────
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('qr')) {
            document.getElementById('btnWrap').style.display = 'none';
            showStatus('⏳ Đang xử lý điểm danh...');
            submitAttendance(urlParams.get('qr'));
        }

        // ── Nút Bật Camera ────────────────────────────────────────
        document.getElementById('btnStartCamera').addEventListener('click', function () {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<div class="spin-ring"></div> Đang tải thư viện...';

            ensureLibraryLoaded(() => {
                btn.innerHTML = '<ion-icon name="camera-outline" style="font-size:20px;"></ion-icon> Đang bật camera...';
                startCamera();
            });
        });

        function startCamera() {
            const loadingMsg = document.getElementById('cameraLoadingMsg');
            loadingMsg.classList.add('show');
            html5QrCode = new Html5Qrcode('reader');

            // Timeout bảo vệ: nếu camera không bật được sau 10s → hiện lỗi
            const hangTimer = setTimeout(() => {
                loadingMsg.classList.remove('show');
                showStatus(' Camera không phản hồi. Vui lòng kiểm tra quyền camera và thử lại.', true);
                resetBtn();
                try { html5QrCode.stop(); } catch(e) {}
            }, 10000);

            // Cấu hình scan đơn giản, tương thích iOS/Android
            const scanConfig = {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            };

            // iOS Safari chỉ hiểu facingMode đơn giản, không dùng { ideal: ... }
            html5QrCode.start(
                { facingMode: 'environment' },
                scanConfig,
                onScanSuccess,
                onScanFailure
            ).then(() => {
                clearTimeout(hangTimer);
                loadingMsg.classList.remove('show');
                document.getElementById('btnWrap').style.display = 'none';
                showStatus('📷 Camera đang hoạt động. Đưa mã QR vào khung hình...');
            }).catch(() => {
                // Fallback: camera trước (laptop / iPad front cam)
                html5QrCode.start(
                    { facingMode: 'user' },
                    scanConfig,
                    onScanSuccess,
                    onScanFailure
                ).then(() => {
                    clearTimeout(hangTimer);
                    loadingMsg.classList.remove('show');
                    document.getElementById('btnWrap').style.display = 'none';
                    showStatus('📷 Camera đang hoạt động. Đưa mã QR vào khung hình...');
                }).catch(err => {
                    clearTimeout(hangTimer);
                    loadingMsg.classList.remove('show');
                    showStatus('❌ Không thể bật camera. Vui lòng cấp quyền camera và thử lại.', true);
                    resetBtn();
                    console.error('Camera error:', err);
                });
            });
        }



        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            showStatus('⏳ Đang xử lý dữ liệu...');
            try { html5QrCode.pause(true); } catch(e) {}

            // QR code encode URL đầy đủ: https://site/student/attendance.html?qr=UUID
            // Cần extract chỉ phần UUID để gửi lên backend
            let qrToken = decodedText.trim();
            try {
                const parsed = new URL(decodedText);
                const fromParam = parsed.searchParams.get('qr');
                if (fromParam) qrToken = fromParam;   // Lấy UUID từ ?qr=
            } catch (e) {
                // decodedText không phải URL → dùng nguyên (fallback)
            }

            submitAttendance(qrToken);
        }


        function onScanFailure() { /* bỏ qua lỗi frame liên tục */ }

        // ── API điểm danh ─────────────────────────────────────────
        async function submitAttendance(qrCodeContent) {
            try {
                const response = await authFetch(`${API_BASE_URL}/student/attendances/check-in`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qrCode: qrCodeContent })
                });
                const data = await response.json();
                if (response.ok) {
                    showSuccessOverlay();
                } else {
                    const msg = data.error || 'Điểm danh thất bại. Vui lòng thử lại.';
                    showStatus('❌ ' + msg, true);
                    showToast(msg, 'error');
                    resetScanner();
                }
            } catch (err) {
                showStatus('❌ Lỗi kết nối mạng. Kiểm tra internet và thử lại.', true);
                showToast('Lỗi kết nối mạng.', 'error');
                resetScanner();
            }
        }

        function resetScanner() {
            setTimeout(() => {
                isProcessing = false;
                if (html5QrCode) {
                    try { html5QrCode.resume(); } catch(e) {}
                }
            }, 2500);
        }

        function resetBtn() {
            const btn = document.getElementById('btnStartCamera');
            btn.disabled = false;
            btn.innerHTML = '<ion-icon name="camera-outline" style="font-size:20px;"></ion-icon> Bật Camera Quét QR';
            document.getElementById('btnWrap').style.display = 'block';
        }

        function showStatus(msg, isError = false) {
            const el = document.getElementById('scanStatus');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.color = isError ? 'var(--danger, #ef4444)' : 'var(--primary)';
        }

        // ── Success Overlay ───────────────────────────────────────
        function showSuccessOverlay() {
            try { if (html5QrCode) html5QrCode.stop(); } catch(e) {}

            const overlay = document.getElementById('successOverlay');
            overlay.classList.add('show');

            let countdown = 3;
            const countEl = document.getElementById('overlayCountdown');
            const interval = setInterval(() => {
                countdown--;
                if (countEl) countEl.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
