<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Đổi Mật Khẩu | Sinh Viên</title>
    <meta name="description" content="Thay đổi mật khẩu tài khoản sinh viên">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .pwd-section { padding: 24px 20px; position: relative; z-index: 1; }
        .pwd-header-icon {
            width: 64px; height: 64px; border-radius: 18px;
            background: linear-gradient(135deg, rgba(79,70,229,0.1), rgba(236,72,153,0.1));
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--primary); margin: 0 auto 16px;
        }
        .pwd-title { text-align: center; margin-bottom: 24px; }
        .pwd-title h2 { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
        .pwd-title p { font-size: 14px; color: var(--text-muted); }
        .pwd-card {
            background: var(--bg-surface); border: 1px solid var(--glass-border);
            border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow-sm); margin-bottom: 16px;
        }
        .pwd-field-group { padding: 16px; border-bottom: 1px solid rgba(0,0,0,0.04); }
        .pwd-field-group:last-child { border-bottom: none; }
        .pwd-field-label {
            font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px;
        }
        .pwd-input-wrap {
            display: flex; align-items: center; position: relative;
        }
        .pwd-input-wrap input {
            width: 100%; padding: 12px 44px 12px 14px; border: 1px solid var(--border-color);
            border-radius: 12px; font-size: 15px; color: var(--text-dark);
            background: var(--bg-main); transition: all 0.2s; outline: none;
        }
        .pwd-input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
            background: #fff;
        }
        .pwd-toggle {
            position: absolute; right: 12px; cursor: pointer;
            color: var(--text-muted); display: flex; font-size: 20px;
            transition: color 0.2s; padding: 4px;
        }
        .pwd-toggle:hover { color: var(--primary); }
        .strength-bar-wrap {
            height: 4px; border-radius: 4px; margin-top: 10px;
            background: rgba(0,0,0,0.06); overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s;
            width: 0;
        }
        .strength-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        .match-msg { font-size: 12px; margin-top: 6px; display: none; }
        .match-msg.ok { color: #10b981; display: block; }
        .match-msg.no { color: #ef4444; display: block; }
        .pwd-actions { padding: 0 20px 24px; position: relative; z-index: 1; }
        .btn-submit-pwd {
            width: 100%; padding: 14px; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; box-shadow: 0 4px 16px rgba(79,70,229,0.3);
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit-pwd:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
        .btn-submit-pwd:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .security-tip {
            display: flex; gap: 10px; padding: 14px 16px; margin: 0 20px 20px;
            background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.12);
            border-radius: 12px; font-size: 13px; color: var(--text-muted);
            position: relative; z-index: 1;
        }
        .security-tip ion-icon { font-size: 18px; color: #f59e0b; flex-shrink: 0; margin-top: 1px; }
        .back-btn {
            display: flex; align-items: center; gap: 4px;
            color: var(--text-muted); font-size: 14px; font-weight: 500;
            text-decoration: none; padding: 4px 0; transition: color 0.2s;
        }
        .back-btn:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="app-root">
        <header class="premium-header">
            <a href="profile.html" class="back-btn">
                <ion-icon name="chevron-back-outline"></ion-icon> Quay lại
            </a>
            <div class="brand">Đổi Mật Khẩu</div>
            <div style="width: 70px;"></div>
        </header>

        <form id="pwdForm">
            <div class="pwd-section">
                <div class="pwd-header-icon">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                </div>
                <div class="pwd-title">
                    <h2>Cập Nhật Mật Khẩu</h2>
                    <p>Bảo vệ tài khoản bằng mật khẩu mạnh.</p>
                </div>

                <div class="pwd-card">
                    <div class="pwd-field-group">
                        <div class="pwd-field-label">Mật khẩu hiện tại</div>
                        <div class="pwd-input-wrap">
                            <input type="password" id="oldPassword" required placeholder="Nhập mật khẩu hiện tại">
                            <span class="pwd-toggle" onclick="togglePwd('oldPassword')">
                                <ion-icon name="eye-outline"></ion-icon>
                            </span>
                        </div>
                    </div>
                    <div class="pwd-field-group">
                        <div class="pwd-field-label">Mật khẩu mới</div>
                        <div class="pwd-input-wrap">
                            <input type="password" id="newPassword" required placeholder="Tối thiểu 6 ký tự" minlength="6">
                            <span class="pwd-toggle" onclick="togglePwd('newPassword')">
                                <ion-icon name="eye-outline"></ion-icon>
                            </span>
                        </div>
                        <div class="strength-bar-wrap"><div class="strength-bar-fill" id="strengthBar"></div></div>
                        <div class="strength-label" id="strengthText">Tối thiểu 6 ký tự</div>
                    </div>
                    <div class="pwd-field-group">
                        <div class="pwd-field-label">Xác nhận mật khẩu mới</div>
                        <div class="pwd-input-wrap">
                            <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu mới">
                            <span class="pwd-toggle" onclick="togglePwd('confirmPassword')">
                                <ion-icon name="eye-outline"></ion-icon>
                            </span>
                        </div>
                        <div class="match-msg" id="matchMsg"></div>
                    </div>
                </div>
            </div>

            <div class="pwd-actions">
                <button type="submit" class="btn-submit-pwd" id="submitBtn">
                    <ion-icon name="shield-checkmark-outline"></ion-icon> Cập Nhật Mật Khẩu
                </button>
            </div>
        </form>

        <div class="security-tip">
            <ion-icon name="information-circle-outline"></ion-icon>
            <span>Sau khi đổi mật khẩu, hãy sử dụng mật khẩu mới cho lần đăng nhập tiếp theo.</span>
        </div>
    </div>

    <script src="js/utils.js?v=101"></script>
    <script>
        const auth = checkAuth('STUDENT');

        function togglePwd(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('ion-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('name', 'eye-off-outline');
            } else {
                input.type = 'password';
                icon.setAttribute('name', 'eye-outline');
            }
        }

        document.getElementById('newPassword').addEventListener('input', function() {
            const val = this.value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { width: '0%', color: '#e2e8f0', label: 'Tối thiểu 6 ký tự' },
                { width: '20%', color: '#ef4444', label: 'Rất yếu' },
                { width: '40%', color: '#f59e0b', label: 'Yếu' },
                { width: '60%', color: '#f59e0b', label: 'Trung bình' },
                { width: '80%', color: '#10b981', label: 'Mạnh' },
                { width: '100%', color: '#10b981', label: 'Rất mạnh' }
            ];
            const level = levels[Math.min(strength, 5)];
            bar.style.width = level.width;
            bar.style.background = level.color;
            text.textContent = val ? level.label : 'Tối thiểu 6 ký tự';
            checkMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', checkMatch);
        function checkMatch() {
            const pw = document.getElementById('newPassword').value;
            const cf = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('matchMsg');
            if (!cf) { msg.className = 'match-msg'; return; }
            if (pw === cf) { msg.className = 'match-msg ok'; msg.textContent = '✓ Mật khẩu khớp'; }
            else { msg.className = 'match-msg no'; msg.textContent = '✗ Mật khẩu không khớp'; }
        }

        document.getElementById('pwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (newPassword.length < 6) { showToast('Mật khẩu mới phải có ít nhất 6 ký tự.', 'error'); return; }
            if (newPassword !== confirmPassword) { showToast('Mật khẩu xác nhận không khớp.', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<div class="spin" style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;display:inline-block;"></div> Đang xử lý...';

            try {
                const res = await authFetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                if (res.ok) {
                    showToast('Đổi mật khẩu thành công!', 'success');
                    document.getElementById('pwdForm').reset();
                    document.getElementById('strengthBar').style.width = '0';
                    document.getElementById('strengthText').textContent = 'Tối thiểu 6 ký tự';
                    document.getElementById('matchMsg').className = 'match-msg';
                } else {
                    const data = await res.json().catch(() => ({}));
                    showToast(data.error || 'Mật khẩu cũ không chính xác.', 'error');
                }
            } catch {
                showToast('Lỗi kết nối mạng.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<ion-icon name="shield-checkmark-outline"></ion-icon> Cập Nhật Mật Khẩu';
            }
        });
    </script>
</body>
</html>
