<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Trang Chủ | Sinh Viên QR Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="app-root">
        <header class="app-header premium-header">
            <div class="brand">🎓 QR Attendance</div>
            <div class="header-profile" onclick="event.stopPropagation(); document.getElementById('studentProfileDropdown').classList.toggle('show')">
                <img src="../teacher/css/default-avatar.png" id="studentAvatar" onerror="this.src='https://ui-avatars.com/api/?name=Student&background=random'" alt="Avatar" class="avatar">
                <div class="user-name" id="headerUserName">Sinh Viên</div>
                <ion-icon name="chevron-down-outline"></ion-icon>
                
                <div class="profile-dropdown" id="studentProfileDropdown" onclick="event.stopPropagation()">
                    <a href="profile.html"><ion-icon name="person-outline"></ion-icon> Thông tin cá nhân</a>
                    <a href="change-password.html"><ion-icon name="key-outline"></ion-icon> Đổi mật khẩu</a>
                    <button class="text-danger" onclick="logout()"><ion-icon name="log-out-outline"></ion-icon> Đăng xuất</button>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="welcome-section">
                <h1 class="page-title">Xin chào! 👋</h1>
                <p class="page-sub" id="welcomeMsg">Chào mừng bạn đến với hệ thống điểm danh QR.</p>
            </div>

            <div class="action-grid">
                <a href="enrollment.html" class="premium-card action-card enrollment-bg">
                    <div class="card-icon"><ion-icon name="book-outline"></ion-icon></div>
                    <h2>Đăng Ký Học Phần</h2>
                    <p>Đăng ký môn học để điểm danh.</p>
                </a>

                <a href="history.html" class="premium-card action-card history-bg">
                    <div class="card-icon"><ion-icon name="receipt-outline"></ion-icon></div>
                    <h2>Kết Quả Điểm Danh</h2>
                    <p>Xem lại lịch sử điểm danh.</p>
                </a>
            </div>

            <!-- Recent summary -->
            <div class="premium-card recent-card">
                <div class="card-header-flex">
                    <h3>Điểm Danh Gần Đây</h3>
                    <ion-icon name="time-outline"></ion-icon>
                </div>
                <div id="recentList">
                    <p class="loading-text">Đang tải...</p>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn active">
                <ion-icon name="home-outline"></ion-icon>
                <span>Trang Chủ</span>
            </a>
            <a href="enrollment.html" class="nav-btn">
                <ion-icon name="book-outline"></ion-icon>
                <span>Đăng Ký</span>
            </a>
            <a href="timetable.html" class="nav-btn">
                <ion-icon name="calendar-outline"></ion-icon>
                <span>Lịch Học</span>
            </a>
            <a href="history.html" class="nav-btn">
                <ion-icon name="time-outline"></ion-icon>
                <span>Kết Quả</span>
            </a>
        </nav>
    </div>

    <script src="js/utils.js?v=99"></script>
    <script>
        const auth = checkAuth('STUDENT');
        if (auth) {
            document.getElementById('headerUserName').textContent = auth.name || 'Sinh Viên';
            document.getElementById('welcomeMsg').textContent = `Chào ${auth.name || 'bạn'}! Hôm nay có buổi học nào không?`;
            loadRecent();
        }

        async function loadRecent() {
            const div = document.getElementById('recentList');
            try {
                const res = await authFetch(`${API_BASE_URL}/student/my-attendances`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const recent = data.slice(0, 3);
                if (!recent.length) {
                    div.innerHTML = '<p class="loading-text">Chưa có lần điểm danh nào.</p>';
                    return;
                }
                div.innerHTML = recent.map(r => `
                    <div class="recent-item">
                        <div class="recent-info">
                            <div class="subject-name">${r.subjectName}</div>
                            <div class="meta-info">${r.className} · ${formatDate(r.sessionStartTime)}</div>
                        </div>
                        <span class="status-badge success">✓ Đã điểm danh</span>
                    </div>
                `).join('');
            } catch {
                div.innerHTML = '<p class="loading-text">Không thể tải dữ liệu.</p>';
            }
        }

        function formatDate(dt) {
            if (!dt) return '';
            return new Date(dt).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
        }
    </script>
</body>
</html>
