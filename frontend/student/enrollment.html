<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Đăng Ký Học Phần | Sinh Viên QR Attendance</title>
    <meta name="description" content="Trang đăng ký học phần cho sinh viên hệ thống điểm danh QR">
    <link rel="stylesheet" href="css/style.css?v=3">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 11px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }
        .search-bar select {
            padding: 11px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .course-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .course-card.enrolled {
            border-color: rgba(16,185,129,0.4);
            background: rgba(16,185,129,0.05);
        }
        .course-card:hover { border-color: var(--primary); }
        .course-info { flex: 1; }
        .course-code {
            display: inline-block;
            background: rgba(108,99,255,0.15);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .course-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .course-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .course-meta span { display: flex; align-items: center; gap: 4px; }

        .btn-enroll {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-enroll.enroll {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
        }
        .btn-enroll.enroll:hover { opacity: 0.85; transform: scale(0.97); }
        .btn-enroll.unenroll {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
        }
        .btn-enroll.unenroll:hover { background: rgba(239,68,68,0.2); }
        .btn-enroll:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .badge-enrolled {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(16,185,129,0.15);
            color: #10b981;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-tab {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .filter-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .summary-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-item {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .summary-num {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }
        .summary-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    </style>
</head>
<body>
    <div class="app-root">
        <header class="app-header">
            <div>
                <div class="brand">🎓 QR Attendance</div>
                <div class="user-name" id="headerUserName">Sinh Viên</div>
            </div>
            <button class="btn-logout-sm" onclick="logout()">Đăng xuất</button>
        </header>

        <div class="page-content">
            <h1 class="page-title">📚 Đăng Ký Học Phần</h1>
            <p class="page-sub">Chọn các môn học để đăng ký. Chỉ những môn đã đăng ký mới được điểm danh.</p>

            <div class="summary-row">
                <div class="summary-item">
                    <div class="summary-num" id="totalCount">—</div>
                    <div class="summary-label">Tổng môn học</div>
                </div>
                <div class="summary-item">
                    <div class="summary-num" id="enrolledCount" style="color:#10b981;">—</div>
                    <div class="summary-label">Đã đăng ký</div>
                </div>
            </div>

            <!-- Search + Filter -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Tìm theo tên môn, mã, giảng viên..." oninput="renderCourses()">
                <select id="semesterFilter" onchange="renderCourses()">
                    <option value="ALL">Tất cả học kỳ</option>
                </select>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" id="tabAll" onclick="setTab('all')">Tất cả</button>
                <button class="filter-tab" id="tabEnrolled" onclick="setTab('enrolled')">Đã đăng ký</button>
                <button class="filter-tab" id="tabAvail" onclick="setTab('available')">Chưa đăng ký</button>
            </div>

            <div id="courseList" class="course-list">
                <p style="color:var(--text-muted);text-align:center;padding:24px;">Đang tải danh sách môn học...</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn">
                <ion-icon name="home-outline"></ion-icon>
                <span>Trang Chủ</span>
            </a>
            <a href="enrollment.html" class="nav-btn active">
                <ion-icon name="book-outline"></ion-icon>
                <span>Đăng Ký</span>
            </a>
            <a href="timetable.html" class="nav-btn">
                <ion-icon name="calendar-outline"></ion-icon>
                <span>Lịch Học</span>
            </a>
            <a href="attendance.html" class="nav-btn">
                <ion-icon name="qr-code-outline"></ion-icon>
                <span>Quét QR</span>
            </a>
            <a href="history.html" class="nav-btn">
                <ion-icon name="time-outline"></ion-icon>
                <span>Lịch Sử</span>
            </a>
        </nav>
    </div>

    <div id="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/enrollment.js?v=1"></script>
</body>
</html>
