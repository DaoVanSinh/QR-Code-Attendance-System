<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu | QR Attendance</title>
    <link rel="stylesheet" href="../admin/css/style.css?v=99">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main); padding: 20px; }
        .card { background: var(--bg-surface); padding: 40px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: var(--text-dark); }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(0,0,0,0.05); color: var(--text-dark); }
        .btn { width: 100%; padding: 12px; font-size: 15px; }
        .back-link { display: block; text-align: center; margin-top: 16px; color: var(--primary); font-size: 14px; text-decoration: none; }
        .msg { font-size: 14px; margin-top: 12px; text-align: center; display: none; }
        .msg.success { color: #10b981; }
        .msg.error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">Khôi Phục Mật Khẩu</div>
        <div class="subtitle">Nhập địa chỉ email liên kết với tài khoản của bạn để nhận liên kết khôi phục.</div>
        
        <form id="forgotForm">
            <input type="email" id="email" placeholder="Địa chỉ email..." required>
            <button type="submit" class="btn" id="submitBtn">Gửi Liên Kết Khôi Phục</button>
            <div id="msg" class="msg"></div>
        </form>
        <a href="login.html" class="back-link">Quay lại đăng nhập</a>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgBox = document.getElementById('msg');
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.textContent = 'Đang gửi...';
            msgBox.style.display = 'none';

            try {
                const res = await fetch('/api/user/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (res.ok) {
                    msgBox.className = 'msg success';
                    msgBox.innerText = 'Đã gửi liên kết khôi phục. Vui lòng kiểm tra hộp thư của bạn (cả mục Spam).';
                    msgBox.style.display = 'block';
                } else {
                    const data = await res.json();
                    msgBox.className = 'msg error';
                    msgBox.innerText = data.error || 'Có lỗi xảy ra.';
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                msgBox.className = 'msg error';
                msgBox.innerText = 'Lỗi kết nối mạng.';
                msgBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Gửi Liên Kết Khôi Phục';
            }
        });
    </script>
</body>
</html>
