<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account Profile</title>
    <!-- Use existing stylesheet -->
    <link rel="stylesheet" href="../admin/css/style.css">
    <style>
        .error-msg { color: #f87171; font-size: 14px; margin-top: 10px; display: none; }
        .success-msg { color: #34d399; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="glass-panel" style="max-width: 500px;">
        <div class="nav-bar">
            <div>
                <span id="roleLabel" style="font-size: 14px; color: var(--text-muted); text-transform: uppercase;">Tài Khoản Người Dùng</span><br>
                <strong>Thông Tin Cá Nhân</strong>
            </div>
            <button class="btn" style="background:transparent; border: 1px solid var(--text-muted); color: var(--text-muted);" onclick="window.history.back()">Quay Lại</button>
        </div>

        <form id="profileForm" style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Địa Chỉ Email</label>
                <!-- Disabled Input để biểu thị tính Readonly -->
                <input type="text" id="email" readonly disabled style="width:100%; padding: 12px; border-radius: 8px; border: 1px dashed var(--glass-border); background: rgba(255,255,255,0.02); color: var(--text-muted); outline:none; cursor:not-allowed;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Họ và Tên (Quản lý bởi Admin)</label>
                <input type="text" id="fullName" readonly disabled style="width:100%; padding: 12px; border-radius: 8px; border: 1px dashed var(--glass-border); background: rgba(255,255,255,0.02); color: var(--text-muted); outline:none; cursor:not-allowed;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Số Điện Thoại</label>
                <input type="text" id="phone" placeholder="Nhập số điện thoại hợp lệ" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline:none;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Liên Kết Ảnh Đại Diện (Avatar)</label>
                <input type="text" id="avatar" placeholder="https://example.com/avatar.png" style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline:none;">
            </div>
            
            <button type="submit" id="submitBtn" class="btn" style="width: 100%; padding: 14px; font-size: 16px;">Lưu Thay Đổi</button>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
        </form>
    </div>
    
    <script src="js/profile.js"></script>
</body>
</html>
