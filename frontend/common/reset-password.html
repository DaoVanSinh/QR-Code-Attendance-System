<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu | QR Attendance</title>
    <link rel="stylesheet" href="../admin/css/style.css?v=99">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main); padding: 20px; }
        .card { background: var(--bg-surface); padding: 40px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: var(--text-dark); }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(0,0,0,0.05); color: var(--text-dark); outline:none;}
        .btn { width: 100%; padding: 12px; font-size: 15px; }
        .msg { font-size: 14px; margin-top: 12px; text-align: center; display: none; }
        .msg.success { color: #10b981; }
        .msg.error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">Tạo Mật Khẩu Mới</div>
        <div class="subtitle">Vui lòng nhập mật khẩu mới của bạn. Tối thiểu 6 ký tự.</div>
        
        <form id="resetForm">
            <input type="password" id="newPassword" placeholder="Mật khẩu mới..." required minlength="6">
            <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu mới..." required minlength="6">
            <button type="submit" class="btn" id="submitBtn">Đổi Mật Khẩu</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.querySelector('.card').innerHTML = '<div class="msg error" style="display:block">Lỗi: Không tìm thấy mã xác nhận (token). Vui lòng thử yêu cầu lại từ email.</div><a href="login.html" style="display:block; text-align:center; margin-top:15px; color:var(--primary);">Về trang Đăng nhập</a>';
        }

        document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgBox = document.getElementById('msg');
            const btn = document.getElementById('submitBtn');
            
            if (newPassword !== confirmPassword) {
                msgBox.className = 'msg error';
                msgBox.innerText = 'Mật khẩu xác nhận không khớp.';
                msgBox.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Đang xử lý...';
            msgBox.style.display = 'none';

            try {
                const res = await fetch('/api/user/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (res.ok) {
                    msgBox.className = 'msg success';
                    msgBox.innerHTML = 'Đổi mật khẩu thành công! <br><br> <a href="login.html" style="color:var(--primary);font-weight:bold;">Bấm vào đây để Đăng Nhập</a>';
                    msgBox.style.display = 'block';
                    btn.style.display = 'none';
                    document.getElementById('newPassword').style.display = 'none';
                    document.getElementById('confirmPassword').style.display = 'none';
                } else {
                    const data = await res.json();
                    msgBox.className = 'msg error';
                    msgBox.innerText = data.error || 'Mã xác nhận không hợp lệ hoặc đã hết hạn.';
                    msgBox.style.display = 'block';
                }
            } catch (err) {
                msgBox.className = 'msg error';
                msgBox.innerText = 'Lỗi kết nối mạng.';
                msgBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Đổi Mật Khẩu';
            }
        });
    </script>
</body>
</html>
