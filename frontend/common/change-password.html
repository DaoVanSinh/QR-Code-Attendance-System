<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <!-- Use existing stylesheet -->
    <link rel="stylesheet" href="../admin/css/style.css?v=99">
    <style>
        .error-msg { color: #f87171; font-size: 14px; margin-top: 10px; display: none; }
        .success-msg { color: #34d399; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="glass-panel" style="max-width: 450px;">
        <div class="nav-bar">
            <div>
                <span style="font-size: 14px; color: var(--text-muted);">Cài Đặt Bảo Mật</span><br>
                <strong>Đổi Mật Khẩu</strong>
            </div>
            <button class="btn" style="background:transparent; border: 1px solid var(--text-muted); color: var(--text-muted);" onclick="window.history.back()">Quay Lại</button>
        </div>

        <form id="pwdForm" style="margin-top: 20px;">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Mật Khẩu Hiện Tại</label>
                <input type="password" id="oldPassword" required style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline:none;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; margin-bottom:5px; font-weight:500;">Mật Khẩu Mới</label>
                <input type="password" id="newPassword" required style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline:none;">
            </div>
            
            <button type="submit" id="submitBtn" class="btn" style="width: 100%; padding: 14px; font-size: 16px;">Cập Nhật Mật Khẩu</button>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
        </form>
    </div>
    
    <script src="js/change-password.js"></script>
</body>
</html>
