<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Sinh Viên | QR Attendance</title>
    <meta name="description" content="Xem danh sách sinh viên đã đăng ký theo môn học">
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 9px 14px;
            border-radius: 10px;
            border: 1.5px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            min-width: 220px;
        }
        .filter-select:focus { border-color: var(--primary); }

        .stat-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .stat-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(79,70,229,0.12);
            color: var(--primary);
            border: 1px solid rgba(79,70,229,0.25);
        }
        .stat-chip.green {
            background: rgba(16,185,129,0.1);
            color: #10b981;
            border-color: rgba(16,185,129,0.25);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state ion-icon { font-size: 48px; opacity: 0.3; display: block; margin: 0 auto 14px; }
        .empty-state p { font-size: 15px; margin: 0; }

        .badge-active {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(16,185,129,0.12);
            color: #10b981;
        }
        .badge-inactive {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
        }

        .course-info-bar {
            background: rgba(79,70,229,0.08);
            border: 1px solid rgba(79,70,229,0.15);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 18px;
            display: none;
            gap: 20px;
            flex-wrap: wrap;
        }
        .course-info-bar.show { display: flex; }
        .course-info-item { font-size: 13px; color: var(--text-muted); }
        .course-info-item strong { color: var(--text-dark); margin-left: 4px; }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Danh Sách Sinh Viên Đăng Ký</h1>
                <p class="page-subtitle">Xem sinh viên đã đăng ký theo từng môn học / lớp học phần.</p>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="glass-card" style="padding:18px 22px;margin-bottom:20px;">
            <div class="filter-bar">
                <div>
                    <label style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;">
                        Học kỳ
                    </label>
                    <select class="filter-select" id="semesterFilter" onchange="onSemesterChange()">
                        <option value="">-- Chọn học kỳ --</option>
                    </select>
                </div>
                <div>
                    <label style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;">
                        Môn học / Lớp học phần
                    </label>
                    <select class="filter-select" id="courseFilter" onchange="onCourseChange()" disabled>
                        <option value="">-- Chọn học kỳ trước --</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Course info bar -->
        <div class="course-info-bar" id="courseInfoBar">
            <div class="course-info-item"><ion-icon name="book-outline"></ion-icon> Môn học: <strong id="infoSubject">—</strong></div>
            <div class="course-info-item"><ion-icon name="person-outline"></ion-icon> Giảng viên: <strong id="infoTeacher">—</strong></div>
            <div class="course-info-item"><ion-icon name="calendar-outline"></ion-icon> Học kỳ: <strong id="infoSemester">—</strong></div>
            <div class="course-info-item"><ion-icon name="people-outline"></ion-icon> Sĩ số: <strong id="infoSlots">—</strong></div>
        </div>

        <!-- Student table -->
        <div class="glass-card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
                <h2>Danh Sách Sinh Viên</h2>
                <div class="stat-chips">
                    <span class="stat-chip green" id="chipCount" style="display:none;">
                        <ion-icon name="people-outline"></ion-icon>
                        <span id="chipCountVal">0</span> sinh viên
                    </span>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="studentTableEl">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Mã SV</th>
                            <th>Họ Tên</th>
                            <th>Email</th>
                            <th>Lớp</th>
                            <th>Ngày đăng ký</th>
                            <th style="text-align:center;">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <ion-icon name="school-outline"></ion-icon>
                                    <p>Chọn học kỳ và môn học để xem danh sách sinh viên</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=300"></script>
    <script>
        const auth = checkAuth('ADMIN');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildAdminSidebar('student-list.html');
            fetchAndCacheAvatar();
        }
    </script>
    <script src="js/student-list.js?v=1"></script>
</body>
</html>
