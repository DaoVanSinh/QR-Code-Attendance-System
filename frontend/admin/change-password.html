<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu | Admin Panel</title>
    <meta name="description" content="Thay đổi mật khẩu tài khoản Admin">
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .password-page { max-width: 560px; }
        .security-card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius); overflow: hidden;
        }
        .security-card-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border-color);
            background: rgba(248,250,252,0.5);
        }
        .security-card-header h3 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .security-card-header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .security-card-body { padding: 24px; }
        .pwd-field { margin-bottom: 20px; }
        .pwd-field:last-child { margin-bottom: 0; }
        .pwd-field label {
            display: block; font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px;
        }
        .pwd-input-wrapper {
            position: relative; display: flex; align-items: center;
        }
        .pwd-input-wrapper input {
            width: 100%; padding: 12px 44px 12px 14px; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); font-size: 14px; color: var(--text-dark);
            background: var(--bg-surface); transition: all 0.2s;
        }
        .pwd-input-wrapper input:focus {
            border-color: var(--primary); outline: none;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .toggle-pwd {
            position: absolute; right: 12px; cursor: pointer;
            color: var(--text-muted); display: flex; font-size: 20px;
            transition: color 0.2s;
        }
        .toggle-pwd:hover { color: var(--primary); }
        .pwd-strength {
            height: 3px; border-radius: 3px; margin-top: 8px;
            background: var(--border-color); overflow: hidden;
        }
        .pwd-strength-bar {
            height: 100%; border-radius: 3px; transition: width 0.3s, background 0.3s;
            width: 0;
        }
        .pwd-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        .pwd-match { font-size: 12px; margin-top: 6px; display: none; }
        .pwd-match.ok { color: var(--success); display: block; }
        .pwd-match.no { color: var(--danger); display: block; }
        .security-actions {
            display: flex; gap: 12px; justify-content: flex-end;
            padding: 20px 24px; border-top: 1px solid var(--border-color);
            background: rgba(248,250,252,0.3);
        }
        .btn-back {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            color: var(--text-dark); padding: 10px 20px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-back:hover { background: var(--bg-main); }
        .security-notice {
            display: flex; gap: 12px; padding: 16px; margin-top: 20px;
            background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.15);
            border-radius: var(--radius-sm); font-size: 13px; color: var(--text-muted);
        }
        .security-notice ion-icon { font-size: 20px; color: var(--warning); flex-shrink: 0; margin-top: 1px; }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="password-page">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Đổi Mật Khẩu</h1>
                    <p class="page-subtitle">Cập nhật mật khẩu để bảo vệ tài khoản của bạn.</p>
                </div>
            </div>

            <div class="security-card">
                <div class="security-card-header">
                    <h3><ion-icon name="lock-closed-outline"></ion-icon> Cài Đặt Mật Khẩu</h3>
                    <p>Mật khẩu nên có ít nhất 6 ký tự, bao gồm chữ hoa, chữ thường và số.</p>
                </div>
                <form id="pwdForm">
                    <div class="security-card-body">
                        <div class="pwd-field">
                            <label for="oldPassword">Mật khẩu hiện tại</label>
                            <div class="pwd-input-wrapper">
                                <input type="password" id="oldPassword" required placeholder="Nhập mật khẩu hiện tại">
                                <span class="toggle-pwd" onclick="togglePwd('oldPassword')">
                                    <ion-icon name="eye-outline"></ion-icon>
                                </span>
                            </div>
                        </div>
                        <div class="pwd-field">
                            <label for="newPassword">Mật khẩu mới</label>
                            <div class="pwd-input-wrapper">
                                <input type="password" id="newPassword" required placeholder="Nhập mật khẩu mới" minlength="6">
                                <span class="toggle-pwd" onclick="togglePwd('newPassword')">
                                    <ion-icon name="eye-outline"></ion-icon>
                                </span>
                            </div>
                            <div class="pwd-strength"><div class="pwd-strength-bar" id="strengthBar"></div></div>
                            <div class="pwd-hint" id="strengthText">Tối thiểu 6 ký tự</div>
                        </div>
                        <div class="pwd-field">
                            <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                            <div class="pwd-input-wrapper">
                                <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu mới">
                                <span class="toggle-pwd" onclick="togglePwd('confirmPassword')">
                                    <ion-icon name="eye-outline"></ion-icon>
                                </span>
                            </div>
                            <div class="pwd-match" id="matchMsg"></div>
                        </div>
                    </div>
                    <div class="security-actions">
                        <a href="profile.html" class="btn-back">
                            <ion-icon name="arrow-back-outline"></ion-icon> Quay lại
                        </a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <ion-icon name="shield-checkmark-outline"></ion-icon> Cập Nhật Mật Khẩu
                        </button>
                    </div>
                </form>
            </div>

            <div class="security-notice">
                <ion-icon name="information-circle-outline"></ion-icon>
                <div>Sau khi đổi mật khẩu, bạn sẽ cần sử dụng mật khẩu mới cho lần đăng nhập tiếp theo. Hãy đảm bảo ghi nhớ mật khẩu mới.</div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=99"></script>
    <script>
        const auth = checkAuth('ADMIN');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildAdminSidebar('change-password.html');
        }

        function togglePwd(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('ion-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('name', 'eye-off-outline');
            } else {
                input.type = 'password';
                icon.setAttribute('name', 'eye-outline');
            }
        }

        // Password strength indicator
        document.getElementById('newPassword').addEventListener('input', function() {
            const val = this.value;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { width: '0%', color: '#e2e8f0', label: 'Tối thiểu 6 ký tự' },
                { width: '20%', color: '#ef4444', label: 'Rất yếu' },
                { width: '40%', color: '#f59e0b', label: 'Yếu' },
                { width: '60%', color: '#f59e0b', label: 'Trung bình' },
                { width: '80%', color: '#10b981', label: 'Mạnh' },
                { width: '100%', color: '#10b981', label: 'Rất mạnh' }
            ];
            const level = levels[Math.min(strength, 5)];
            bar.style.width = level.width;
            bar.style.background = level.color;
            text.textContent = val ? level.label : 'Tối thiểu 6 ký tự';
            checkMatch();
        });

        // Confirm match check
        document.getElementById('confirmPassword').addEventListener('input', checkMatch);
        function checkMatch() {
            const pw = document.getElementById('newPassword').value;
            const cf = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('matchMsg');
            if (!cf) { msg.className = 'pwd-match'; return; }
            if (pw === cf) { msg.className = 'pwd-match ok'; msg.textContent = '✓ Mật khẩu khớp'; }
            else { msg.className = 'pwd-match no'; msg.textContent = '✗ Mật khẩu không khớp'; }
        }

        document.getElementById('pwdForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (newPassword.length < 6) {
                showToast('Mật khẩu mới phải có ít nhất 6 ký tự.', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showToast('Mật khẩu xác nhận không khớp.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="spin" style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;"></div> Đang xử lý...';

            try {
                const res = await authFetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                if (res.ok) {
                    showToast('Đổi mật khẩu thành công!', 'success');
                    document.getElementById('pwdForm').reset();
                    document.getElementById('strengthBar').style.width = '0';
                    document.getElementById('strengthText').textContent = 'Tối thiểu 6 ký tự';
                    document.getElementById('matchMsg').className = 'pwd-match';
                } else {
                    const data = await res.json().catch(() => ({}));
                    showToast(data.error || 'Mật khẩu cũ không chính xác.', 'error');
                }
            } catch {
                showToast('Lỗi kết nối mạng.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<ion-icon name="shield-checkmark-outline"></ion-icon> Cập Nhật Mật Khẩu';
            }
        });
    </script>
</body>
</html>
