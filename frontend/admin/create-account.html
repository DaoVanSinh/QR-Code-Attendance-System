<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Tài Khoản | Admin Dashboard</title>
    <meta name="description" content="Tạo tài khoản mới cho giảng viên và sinh viên">
    <link rel="stylesheet" href="css/style.css?v=2">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Tạo Tài Khoản Mới</h1>
            <p class="page-subtitle">Thêm giảng viên hoặc sinh viên vào hệ thống.</p>
        </div>

        <div class="glass-card" style="max-width: 600px;">
            <div class="card-header">
                <h2>Thông Tin Tài Khoản</h2>
            </div>

            <form id="createAccountForm" style="padding: 0 8px;">
                <div class="form-group">
                    <label>Họ & Tên *</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên đầy đủ" required>
                </div>

                <div class="form-group">
                    <label>Địa chỉ Email *</label>
                    <input type="email" id="email" class="form-control" placeholder="nguyenvana@example.com" required>
                </div>

                <div class="form-group">
                    <label>Mật khẩu khởi tạo *</label>
                    <input type="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                </div>

                <div class="form-group">
                    <label>Vai trò hệ thống *</label>
                    <select id="role" class="form-control" required>
                        <option value="" disabled selected>-- Vui lòng chọn phân quyền --</option>
                        <option value="TEACHER">Giảng Viên (Teacher)</option>
                        <option value="STUDENT">Sinh Viên (Student)</option>
                    </select>
                </div>

                <div class="form-group" id="studentIdGroup" style="display: none;">
                    <label>Mã Sinh Viên *</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập mã sinh viên (VD: SV001)">
                </div>

                <div class="form-group" style="margin-top: 24px; display: flex; gap: 12px;">
                    <button type="button" class="btn btn-outline" onclick="window.history.back()">Hủy bỏ</button>
                    <button type="submit" class="btn btn-primary" style="flex-grow: 1;" id="submitBtn">
                        <span id="btnText">Tạo Tài Khoản</span>
                        <div id="btnSpinner" class="spinner" style="display:none;width:18px;height:18px;border-width:2px;"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=4"></script>
    <script>
        const auth = checkAuth('ADMIN');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildAdminSidebar('create-account.html');
        }
    </script>
    <script src="js/create-account.js?v=2"></script>
</body>
</html>
