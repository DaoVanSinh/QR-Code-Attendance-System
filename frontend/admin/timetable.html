<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu | Admin Dashboard</title>
    <meta name="description" content="Xem thời khóa biểu toàn trường - Admin QR Attendance">
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }

        /* ── Controls bar ────────────────────────────────── */
        .tkb-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--bg-surface);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .filter-group { display:flex; align-items:center; gap:8px; }
        .filter-group label { font-size:13px; font-weight:600; color:var(--text-muted); white-space:nowrap; }
        .tkb-controls select.form-control { height:38px; font-size:13px; border-radius:8px; }

        /* ── Week navigator ──────────────────────────────── */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            background: #eff6ff;
            border: 1.5px solid #bfdbfe;
            border-radius: 10px;
            padding: 4px 10px;
        }
        .week-nav-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: none;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items:center; justify-content:center;
            transition: all 0.15s;
        }
        .week-nav-btn:hover:not(:disabled) { background: #1565c0; color:#fff; transform:scale(1.1); }
        .week-nav-btn:disabled { opacity:0.35; cursor:default; }
        #weekLabel {
            font-size: 13px; font-weight: 700; color: #1d4ed8;
            min-width: 230px; text-align: center;
        }

        /* ── TKB Grid ────────────────────────────────────── */
        .tkb-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .tkb-grid {
            display: grid;
            grid-template-columns: 76px repeat(7, minmax(140px, 1fr));
            grid-auto-rows: minmax(68px, auto);
            gap: 1px;
            background: #dde3ea;
            min-width: max-content;
        }

        /* ── Header ──────────────────────────────────────── */
        .tkb-header {
            background: #1565c0;
            text-align: center;
            padding: 10px 6px 8px;
            position: sticky; top:0; z-index:10;
        }
        .tkb-corner  { background: #0d47a1; display:flex; align-items:center; justify-content:center; }
        .tkb-header-day   { font-size:13px; font-weight:700; color:#fff; }
        .tkb-header-date  { font-size:12px; color:rgba(255,255,255,0.75); margin-top:3px; }
        .tkb-header-today { background: #0d47a1 !important; }
        .today-badge {
            display:inline-block; background:#fff; color:#1565c0 !important;
            border-radius:20px; padding:1px 8px; font-size:11px; margin-top:3px; font-weight:700;
        }
        .today-dot { width:6px; height:6px; background:#fff; border-radius:50%; margin:4px auto 0; }

        /* ── Time label ──────────────────────────────────── */
        .tkb-time-label {
            background: #f1f5f9;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:5px 3px; text-align:center;
        }
        .lesson-num  { font-weight:700; font-size:12px; color:#1565c0; }
        .lesson-time { font-size:10px; color:#94a3b8; margin-top:2px; line-height:1.3; }

        /* ── Empty cells ─────────────────────────────────── */
        .tkb-cell-empty { background: #ffffff; min-height: 68px; }
        .tkb-cell-today { background: #f0f7ff !important; }

        /* ── Course cards ────────────────────────────────── */
        .tkb-course-card {
            border-radius: 6px; border-left: 4px solid;
            padding: 8px 9px; font-size: 11px; line-height: 1.4;
            overflow: hidden; display:flex; flex-direction:column; gap:4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }
        .tkb-course-card:hover { transform:translateY(-2px) scale(1.015); box-shadow:0 6px 16px rgba(0,0,0,0.18); z-index:20; }
        .card-subject { font-weight:700; font-size:12px; line-height:1.3; }
        .card-code    { font-size:10px; font-weight:600; opacity:0.85; }
        .card-meta    { display:flex; flex-direction:column; gap:3px; }
        .card-row {
            display:flex; align-items:center; gap:4px; font-size:10.5px;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .card-row ion-icon { font-size:11px; flex-shrink:0; }
        .card-row span { overflow:hidden; text-overflow:ellipsis; }
        .card-time { font-weight:600; margin-top:2px; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Thời Khóa Biểu Toàn Trường</h1>
                <p class="page-subtitle">Lịch giảng dạy theo tuần — xem và lọc theo giảng viên</p>
            </div>
            <div style="font-size:13px;color:var(--text-muted);background:var(--bg-surface);padding:8px 14px;border-radius:8px;border:1px solid var(--border-primary);">
                Tổng: <strong id="courseCount" style="color:var(--primary);">0</strong> môn học
            </div>
        </div>

        <!-- Controls: filters + week nav -->
        <div class="tkb-controls">
            <div class="filter-group">
                <label>🗓 Học kỳ:</label>
                <select id="semesterFilter" class="form-control" style="width:220px;" onchange="onSemesterChange()">
                    <option value="ALL">— Tất cả học kỳ —</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Tuần:</label>
                <select id="weekFilter" class="form-control" style="width:250px;" onchange="renderGrid()"></select>
            </div>
            <div class="filter-group">
                <label>👨‍🏫 Giảng viên:</label>
                <select id="teacherFilter" class="form-control" style="width:220px;" onchange="renderGrid()">
                    <option value="ALL">— Tất cả —</option>
                </select>
            </div>

            <!-- Mũi tên điều hướng tuần -->
            <div class="week-nav">
                <button id="btnPrevWeek" class="week-nav-btn" title="Tuần trước">
                    <ion-icon name="chevron-back-outline"></ion-icon>
                </button>
                <span id="weekLabel">—</span>
                <button id="btnNextWeek" class="week-nav-btn" title="Tuần sau">
                    <ion-icon name="chevron-forward-outline"></ion-icon>
                </button>
            </div>
        </div>

        <div class="glass-card" style="padding:15px;">
            <div id="loadingMsg" style="text-align:center;padding:40px;color:var(--text-muted);">
                <ion-icon name="sync-outline" style="font-size:32px;animation:spin 1s linear infinite;color:#1565c0;"></ion-icon>
                <p style="margin-top:10px;">Đang tải dữ liệu thời khóa biểu...</p>
            </div>
            <div id="timetableWrapper" class="tkb-wrapper" style="display:none;">
                <div class="tkb-grid" id="tkbGrid"></div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=99"></script>
    <script>
        const auth = checkAuth('ADMIN');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildAdminSidebar('timetable.html');
            if (document.getElementById('sidebarUserName')) {
                document.getElementById('sidebarUserName').textContent = auth.name || 'Admin';
            }
        }
    </script>
    <script src="js/timetable.js?v=6"></script>
</body>
</html>
