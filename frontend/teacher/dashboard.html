<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng Quan | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Tổng Quan</h1>
            <p class="page-subtitle">Xem tổng quan các khóa học và phiên điểm danh của bạn.</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Khóa Học</div>
                <div class="stat-value" id="statCourses">—</div>
            </div>
        </div>

        <div class="glass-card">
            <div class="card-header">
                <h2>Khóa Học Đang Phụ Trách</h2>
                <a href="create-session.html" class="btn btn-primary btn-sm">
                    <ion-icon name="add-outline"></ion-icon> Tạo Phiên Mới
                </a>
            </div>
            <div id="courseGrid" class="course-grid">
                <p style="color:var(--text-muted); padding: 24px;">Đang tải...</p>
            </div>
        </div>
    </main>

    <script src="js/utils.js?v=99"></script>
    <script>
        const auth = checkAuth('TEACHER');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildSidebar('dashboard.html');
            loadDashboard();
        }

        async function loadDashboard() {
            const res = await authFetch(`${API_BASE_URL}/teacher/courses`);
            if (!res.ok) { showToast('Lỗi tải dữ liệu', 'error'); return; }
            const courses = await res.json();

            document.getElementById('statCourses').textContent = courses.length;

            const grid = document.getElementById('courseGrid');
            if (!courses.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                    <ion-icon name="book-outline"></ion-icon>
                    <p>Chưa có khóa học nào được giao cho bạn.</p>
                </div>`;
                return;
            }

            grid.innerHTML = courses.map(c => `
                <div class="course-card">
                    <span class="course-tag">${c.subjectCode}</span>
                    <h3>${c.subjectName}</h3>
                    <div class="course-meta"><ion-icon name="people-outline"></ion-icon>${c.className}</div>
                    <div class="course-meta"><ion-icon name="calendar-outline"></ion-icon>HK ${c.semester}</div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm" onclick="goCreateSession(${c.id})">
                            <ion-icon name="qr-code-outline"></ion-icon> Tạo QR
                        </button>
                        <button class="btn btn-outline btn-sm" onclick="goTimetable(${c.id})">
                            <ion-icon name="calendar-outline"></ion-icon> Lịch Sử
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function goCreateSession(courseId) {
            localStorage.setItem('selected_course_id', courseId);
            window.location.href = 'create-session.html';
        }
        function goTimetable(courseId) {
            localStorage.setItem('selected_course_id', courseId);
            window.location.href = 'timetable.html';
        }
    </script>
</body>
</html>
