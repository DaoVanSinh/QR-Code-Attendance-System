<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm Danh Thủ Công | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .filter-bar {
            display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end;
            background: var(--bg-surface); padding: 20px; border-radius: var(--radius);
            border: 1px solid var(--border-color); margin-bottom: 20px;
        }
        .filter-bar .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-bar label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .filter-bar select { min-width: 220px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; }

        .student-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-color); transition: background 0.15s; }
        .student-row:hover { background: var(--primary-light); }
        .student-row .student-info { flex: 1; }
        .student-row .student-name { font-weight: 600; font-size: 14px; }
        .student-row .student-email { font-size: 12px; color: var(--text-muted); }

        .status-badge { padding: 4px 10px; border-radius: 3px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .status-present { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .status-absent { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

        .toggle-btn {
            padding: 6px 14px; border-radius: 3px; border: 1px solid #ccc;
            font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
            background: #f9f9f9; color: var(--text-dark);
        }
        .toggle-btn:hover { background: #e0e0e0; }
        .toggle-btn.active { background: var(--success); color: #fff; border-color: var(--success); }

        .summary-bar {
            display: flex; gap: 20px; padding: 14px 20px; background: #f5f5f5;
            border: 1px solid var(--border-color); border-radius: var(--radius);
            margin-bottom: 16px; font-size: 14px; align-items: center;
        }
        .summary-bar .count { font-weight: 700; color: var(--primary-dark); }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Điểm Danh Thủ Công</h1>
                <p class="page-subtitle">Điểm danh cho sinh viên không quét được mã QR Code.</p>
            </div>
        </div>

        <!-- Cascade Filters -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>🗓 Học kỳ</label>
                <select id="semesterFilter" onchange="onSemesterChange()">
                    <option value="">— Chọn học kỳ —</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📚 Môn học</label>
                <select id="courseFilter" onchange="onCourseChange()" disabled>
                    <option value="">— Chọn môn học —</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📋 Phiên điểm danh</label>
                <select id="sessionFilter" onchange="onSessionChange()" disabled>
                    <option value="">— Chọn phiên —</option>
                </select>
            </div>
        </div>

        <!-- Summary -->
        <div class="summary-bar" id="summaryBar" style="display:none;">
            <div>Tổng SV: <span class="count" id="totalCount">0</span></div>
            <div>Có mặt: <span class="count" style="color:var(--success);" id="presentCount">0</span></div>
            <div>Vắng mặt: <span class="count" style="color:var(--danger);" id="absentCount">0</span></div>
            <div style="flex:1;"></div>
            <button class="btn btn-primary" id="btnSave" onclick="saveManualAttendance()" disabled>
                <ion-icon name="save-outline"></ion-icon> Lưu Điểm Danh
            </button>
        </div>

        <!-- Student List -->
        <div class="glass-card" id="studentListCard" style="display:none;">
            <div class="card-header">
                <h2>Danh Sách Sinh Viên</h2>
                <button class="btn btn-sm" onclick="toggleAll()" id="btnToggleAll">Đánh dấu tất cả có mặt</button>
            </div>
            <div id="studentList" style="max-height: 600px; overflow-y: auto;">
                <!-- JS renders here -->
            </div>
        </div>

        <div id="emptyState" style="text-align:center;padding:60px 20px;color:var(--text-muted);display:block;">
            <ion-icon name="clipboard-outline" style="font-size:48px;color:#ccc;margin-bottom:12px;display:block;"></ion-icon>
            <p style="font-size:15px;">Chọn Học kỳ → Môn học → Phiên điểm danh để bắt đầu.</p>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=300"></script>
    <script>
        const auth = checkAuth('TEACHER');
        if (auth) {
            document.getElementById('sidebar-placeholder').innerHTML = buildSidebar('manual-attendance.html');
            fetchAndCacheAvatar();
            if(document.getElementById('sidebarUserName')) {
                document.getElementById('sidebarUserName').textContent = auth.name || 'Teacher';
            }
        }
    </script>
    <script src="js/manual-attendance.js?v=1"></script>
</body>
</html>
