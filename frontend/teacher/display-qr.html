<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã QR Điểm Danh | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .qr-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 128px); }
        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 0 8px rgba(129,140,248,0.15), 0 20px 60px rgba(0,0,0,0.5);
            margin: 28px 0;
        }
        .timer-display {
            font-size: 52px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: var(--primary);
            letter-spacing: 2px;
        }
        .timer-display.expired { color: var(--text-muted); font-size: 28px; }
        .qr-label { font-size: 14px; color: var(--text-muted); text-align:center; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="qr-center">
            <div class="glass-card" style="max-width:460px;width:100%;text-align:center;">
                <div id="sessionInfoBox" style="margin-bottom:16px;padding:14px;background:#f0f8ff;border:1px solid #90caf9;border-radius:8px;font-size:13px;text-align:left;">
                    <!-- Render bằng JS -->
                </div>
                <h1 class="page-title" style="margin-bottom:8px;">Quét Để Điểm Danh</h1>
                <p style="font-size:14px;color:var(--text-muted);">Sinh viên sử dụng ứng dụng điện thoại để quét mã này.</p>

                <div class="qr-box">
                    <div id="qrcode"></div>
                </div>
                <p style="font-size:12px;color:var(--success);margin-bottom:8px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px;">
                    <ion-icon name="shield-checkmark-outline"></ion-icon>
                    Mã QR tự động thay đổi sau <span id="qrReloadSec">30</span>s
                </p>
                <div style="background:var(--glass-border);height:6px;border-radius:10px;overflow:hidden;width:100%;margin-bottom:15px;">
                    <div id="qrProgress" style="background:var(--success);width:100%;height:100%;transition:width 1s linear;"></div>
                </div>

                <div class="qr-label">Thời gian còn lại</div>
                <div class="timer-display" id="timerDisplay">00:00</div>

                <div style="display:flex;gap:12px;margin-top:28px;justify-content:center;">
                    <button class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                        <ion-icon name="home-outline"></ion-icon> Về Dashboard
                    </button>
                    <button class="btn btn-primary" onclick="window.location.href='monitor.html'">
                        <ion-icon name="people-outline"></ion-icon> Xem Điểm Danh
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/display-qr.js?v=5"></script>
</body>
</html>
