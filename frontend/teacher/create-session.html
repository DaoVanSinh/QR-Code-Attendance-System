<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Phiên Điểm Danh | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Tạo Phiên Điểm Danh Mới</h1>
            <p class="page-subtitle">Chọn khóa học và cài đặt thời lượng để sinh mã QR cho sinh viên quét.</p>
        </div>

        <div class="glass-card" style="max-width: 580px;">
            <div class="card-header">
                <h2>Thông Tin Phiên</h2>
            </div>
            <form id="sessionForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>Khóa Học *</label>
                    <select id="courseSelect" class="form-select" required>
                        <option value="" disabled selected>Đang tải khóa học...</option>
                    </select>
                    <div id="courseInfoBox" style="display:none;margin-top:14px;"></div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label>Thời Lượng Điểm Danh (Phút) *</label>
                    <input type="number" id="durationInput" class="form-control"
                           value="15" min="1" max="180"
                           placeholder="Nhập số phút (1–180)" required>
                    <span style="font-size:12px;color:var(--text-muted);">Mã QR sẽ hết hạn sau thời gian này.</span>
                </div>

                <div style="display:flex;gap:12px;">
                    <button type="button" class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                        Hủy
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="flex:1;">
                        <ion-icon name="qr-code-outline"></ion-icon> Tạo Mã QR
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/utils.js?v=101"></script>
    <script src="js/create-session.js?v=3"></script>
</body>
</html>
