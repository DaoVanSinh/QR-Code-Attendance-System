<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Phiên Điểm Danh | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Tạo Phiên Điểm Danh Mới</h1>
            <p class="page-subtitle">Chọn khóa học và cài đặt thời lượng để sinh mã QR cho sinh viên quét.</p>
        </div>

        <div class="glass-card" style="max-width: 580px;">
            <div class="card-header">
                <h2>Thông Tin Phiên</h2>
            </div>

            <!-- Cảnh báo có phiên điểm danh chưa kết thúc -->
            <div id="activeSessionWarning" style="display:none; margin-bottom: 24px; padding: 16px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; color: #f57f17;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-weight: 600; font-size: 15px;">
                    <ion-icon name="warning-outline" style="font-size: 22px; color: #fbc02d;"></ion-icon>
                    Phiên Điểm Danh Chưa Kết Thúc
                </div>
                <div style="font-size: 13.5px; line-height: 1.5; margin-bottom: 14px; color: #f57f17;">
                    Bạn đang có một phiên điểm danh cho môn <strong id="activeSessionSubject">...</strong> (Nhóm <strong id="activeSessionClass">...</strong>) vẫn còn hiệu lực. Bạn có muốn tiếp tục hiển thị mã QR này không?
                </div>
                <button type="button" class="btn btn-primary" onclick="window.location.href='display-qr.html'" style="width: 100%; background: #fb8c00; border: none; box-shadow: 0 2px 6px rgba(251, 140, 0, 0.3);">
                    <ion-icon name="scan-outline"></ion-icon> Tiếp tục hiển thị mã QR
                </button>
            </div>

            <form id="sessionForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label>Khóa Học *</label>
                    <select id="courseSelect" class="form-select" required>
                        <option value="" disabled selected>Đang tải khóa học...</option>
                    </select>
                    <div id="courseInfoBox" style="display:none;margin-top:14px;"></div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label>Thời Lượng Điểm Danh (Phút) *</label>
                    <input type="number" id="durationInput" class="form-control"
                           value="15" min="1" max="180"
                           placeholder="Nhập số phút (1–180)" required>
                    <span style="font-size:12px;color:var(--text-muted);">Mã QR sẽ hết hạn sau thời gian này.</span>
                </div>

                <div style="display:flex;gap:12px;">
                    <button type="button" class="btn btn-outline" onclick="window.location.href='dashboard.html'">
                        Hủy
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="flex:1;">
                        <ion-icon name="qr-code-outline"></ion-icon> Tạo Mã QR
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/utils.js?v=300"></script>
    <script src="js/create-session.js?v=3"></script>
</body>
</html>
