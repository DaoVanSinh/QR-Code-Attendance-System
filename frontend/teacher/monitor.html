<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Điểm Danh | Cổng Giảng Viên</title>
    <link rel="stylesheet" href="css/style.css?v=99">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            background: var(--glass-bg, rgba(255,255,255,.06));
            border: 1px solid var(--border-color, rgba(255,255,255,.1));
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .filter-group select {
            padding: 9px 12px;
            border-radius: 9px;
            border: 1px solid var(--border-color, rgba(255,255,255,.15));
            background: var(--input-bg, rgba(255,255,255,.05));
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        /* ── Stats row ── */
        .stats-row {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
        }
        .stat-pill.present  { background: rgba(34,197,94,.15);  color: #22c55e; border: 1px solid rgba(34,197,94,.3); }
        .stat-pill.absent   { background: rgba(239,68,68,.12);  color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
        .stat-pill.total    { background: rgba(99,102,241,.12); color: #818cf8; border: 1px solid rgba(99,102,241,.3); }
        /* ── Status badges in table ── */
        .badge-present { color: #22c55e; font-weight: 600; }
        .badge-absent  { color: #ef4444; font-weight: 600; }
        /* ── Export button ── */
        .btn-export {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity .15s;
            white-space: nowrap;
        }
        .btn-export:hover { opacity: .85; }
        .btn-export:disabled { opacity: .5; cursor: default; }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <!-- Header -->
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
            <div>
                <h1 class="page-title">Danh Sách Điểm Danh</h1>
                <p class="page-subtitle">Xem và lọc điểm danh theo môn học, xuất báo cáo Excel.</p>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="btn btn-outline" onclick="reloadAttendance()" title="Làm mới">
                    <ion-icon name="refresh-outline"></ion-icon> Làm Mới
                </button>
                <button class="btn-export" id="btnExport" onclick="exportExcel()" disabled>
                    <ion-icon name="download-outline"></ion-icon> Xuất Excel
                </button>
            </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>Môn Học / Học Phần</label>
                <select id="filterCourse" onchange="onCourseChange()">
                    <option value="">-- Chọn học phần --</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Phiên Điểm Danh</label>
                <select id="filterSession" onchange="onSessionChange()">
                    <option value="">-- Chọn phiên --</option>
                </select>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-pill total">
                <ion-icon name="people-outline"></ion-icon>
                Tổng SV: <span id="statTotal">0</span>
            </div>
            <div class="stat-pill present">
                <ion-icon name="checkmark-circle-outline"></ion-icon>
                Có mặt: <span id="statPresent">0</span>
            </div>
            <div class="stat-pill absent">
                <ion-icon name="close-circle-outline"></ion-icon>
                Vắng mặt: <span id="statAbsent">0</span>
            </div>
        </div>

        <!-- Table -->
        <div class="glass-card">
            <div class="card-header">
                <h2>Danh Sách Sinh Viên</h2>
                <span id="liveIndicator" class="badge" style="display:none;background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);padding:4px 12px;border-radius:20px;font-size:12px;">
                    🔴 Live
                </span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:50px">#</th>
                            <th>Mã SV</th>
                            <th>Họ &amp; Tên</th>
                            <th>Trạng Thái</th>
                            <th>Thời Gian Điểm Danh</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTable">
                        <tr>
                            <td colspan="5" style="text-align:center;color:var(--text-muted);padding:40px;">
                                Vui lòng chọn học phần và phiên điểm danh.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/utils.js?v=101"></script>
    <script src="js/monitor.js?v=5"></script>
</body>
</html>
